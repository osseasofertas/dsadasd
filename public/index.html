<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download APK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 8px;
        }
        p {
            color: #888;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #22c55e;
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background .2s;
        }
        .btn:hover { background: #16a34a; }
        .size {
            color: #666;
            font-size: 13px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📲</div>
        <h1>Baixar APK</h1>
        <p>Clique no botão abaixo para baixar o aplicativo</p>
        <a href="Pegasus.apk" class="btn" download>⬇ Baixar APK</a>
        <div class="size">Pegasus.apk</div>
    </div>
</body>
</html>
